<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudDrive TV</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
}
header{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}
.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}
nav a{
color:white;
text-decoration:none;
margin:10px;
}
.hero{
text-align:center;
padding:50px 20px;
}
.hero h1{
font-size:40px;
margin-bottom:10px;
}
.hero p{
font-size:18px;
margin-bottom:20px;
}
.btn{
display:inline-block;
padding:12px 25px;
background:#0ea5e9;
color:white;
text-decoration:none;
border-radius:8px;
margin:5px;
}
.section{
padding:30px;
}
iframe{
width:100%;
height:450px;
border:none;
border-radius:10px;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}
.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}
footer{
background:#111827;
padding:20px;
text-align:center;
margin-top:40px;
}
</style>

</head>

<body>

<header>

<div class="logo">
☁ CloudDrive TV
</div>

<nav>
<a href="#">Home</a>
<a href="#">Live TV</a>
<a href="#">Videos</a>
<a href="#">Playlist</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Welcome to CloudDrive TV</h1>

<p>
Watch Live TV, YouTube Videos and Online Streaming
</p>

<a href="#" class="btn">▶ Watch Live</a>

<a href="#" class="btn">📺 Videos</a>

</section>

<section class="section">

<h2>Featured YouTube Video</h2>

<br>

<iframe
src="https://www.youtube.com/embed/ScMzIvxBSi4"
allowfullscreen>
</iframe>

</section>

<section class="section">

<h2>Categories</h2>

<div class="cards">

<div class="card">
🎬 Movies
</div>

<div class="card">
📺 Live TV
</div>

<div class="card">
🎵 Music
</div>

<div class="card">
📚 Education
</div>

</div>

</section>

<footer>

© 2026 CloudDrive TV

</footer>

</body>
</html>
